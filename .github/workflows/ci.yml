name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Pytest with coverage
        run: pytest -q --cov=memtag --cov-report=term-missing --cov-fail-under=85

      - name: Recollect composition demo
        run: |
          chmod +x examples/recollect-demo.sh
          ./examples/recollect-demo.sh | python -m memtag.cli pack examples/vault --stdin --task "deploy API" --stats